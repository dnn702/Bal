<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>現在地の天気</title>
</head>
<body>

<h2>現在地の天気</h2>
<div id="weather">位置情報取得中...</div>

<script>
async function getWeather(lat, lon) {
    try {
        const url =
          `https://api.open-meteo.com/v1/forecast` +
          `?latitude=${lat}` +
          `&longitude=${lon}` +
          `&current=temperature_2m,weather_code`;

        const response = await fetch(url);
        const data = await response.json();

        const temp = data.current.temperature_2m;
        const code = data.current.weather_code;

        let weather = "不明";

        if (code === 0) weather = "晴れ";
        else if ([1,2,3].includes(code)) weather = "くもり";
        else if ([51,53,55,61,63,65,80,81,82].includes(code)) weather = "雨";
        else if ([71,73,75,85,86].includes(code)) weather = "雪";

        document.getElementById("weather").innerHTML =
            `天気: ${weather}<br>気温: ${temp}℃`;

    } catch (e) {
        document.getElementById("weather").textContent =
            "天気取得失敗";
    }
}

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        position => {
            getWeather(
                position.coords.latitude,
                position.coords.longitude
            );
        },
        error => {
            document.getElementById("weather").textContent =
                "位置情報が許可されていません";
        }
    );
} else {
    document.getElementById("weather").textContent =
        "位置情報非対応";
}
</script>

</body>
</html>
