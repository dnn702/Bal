<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>簡易地震計</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    margin-top:50px;
}

#shindo{
    font-size:60px;
    font-weight:bold;
}

#sdo{
    font-size:60px;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>簡易地震計</h1>

<button onclick="startMotion()">
開始
</button>

<button id="resetBtn">
リセット
</button>

<br><br>

<span id="sdo">
震度<span id="shindo">0</span>
</span>

<script>

const levels = [
    "0",
    "1",
    "2",
    "3",
    "4",
    "5弱",
    "5強",
    "6弱",
    "6強",
    "7"
];

let maxLevelIndex = 0;
let resetTimer = null;
let started = false;

function startMotion(){

    if(started) return;

    if(
        typeof DeviceMotionEvent !== "undefined" &&
        typeof DeviceMotionEvent.requestPermission === "function"
    ){

        DeviceMotionEvent.requestPermission()
        .then(permission => {

            if(permission === "granted"){
                startSensor();
            }else{
                alert("モーションセンサーが許可されませんでした");
            }

        });

    }else{

        startSensor();

    }
}

function updateShindo(nowShindo){

    const currentIndex = levels.indexOf(nowShindo);

    if(currentIndex > maxLevelIndex){

        maxLevelIndex = currentIndex;

        document.getElementById("shindo").textContent =
            levels[maxLevelIndex];

        clearTimeout(resetTimer);

        resetTimer = setTimeout(() => {

            maxLevelIndex = 0;

            document.getElementById("shindo").textContent =
                "0";

        }, 60000);

    }

}

function startSensor(){

    if(started) return;

    started = true;

    window.addEventListener("devicemotion", e => {

        let x = e.acceleration?.x || 0;
        let y = e.acceleration?.y || 0;
        let z = e.acceleration?.z || 0;

        let power =
            Math.sqrt(
                x*x +
                y*y +
                z*z
            );

        let shindo = "0";

        if(power > 35) shindo = "7";
        else if(power > 30) shindo = "6強";
        else if(power > 25) shindo = "6弱";
        else if(power > 20) shindo = "5強";
        else if(power > 15) shindo = "5弱";
        else if(power > 10) shindo = "4";
        else if(power > 7) shindo = "3";
        else if(power > 4) shindo = "2";
        else if(power > 2) shindo = "1";

        updateShindo(shindo);

    });

}

document
.getElementById("resetBtn")
.addEventListener("click", () => {

    clearTimeout(resetTimer);

    maxLevelIndex = 0;

    document.getElementById("shindo").textContent =
        "0";

});

</script>

</body>
</html>
