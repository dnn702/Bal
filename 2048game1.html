<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8" />
    
<title>2048 BigInt 8x8</title>
<style>


body { font-family: Arial; text-align: center; background: white; overscroll-behavior: none; }
h1 { font-size: 60px; }
#score, #best { background:#bbada0;color:white;padding:10px;border-radius:5px;display:inline-block;margin:5px; }
#grid { display:grid; grid-gap:10px; background:#bbada0; padding:10px; margin:auto; position:relative; touch-action: none; }
.cell { background:#cdc1b4; border-radius:5px; display:flex; align-items:center; justify-content:center; height:70px; width:70px; font-weight:bold; transition: transform 0.15s ease, background 0.2s; }
.cell.merge { transform: scale(1.2); }/* 色 */ .cell[data-value='2']{background:#eee4da} .cell[data-value='4']{background:#ede0c8} .cell[data-value='8']{background:#f2b179;color:#fff} .cell[data-value='16']{background:#f59563;color:#fff} .cell[data-value='32']{background:#f67c5f;color:#fff} .cell[data-value='64']{background:#f65e3b;color:#fff} .cell[data-value='128'],.cell[data-value='256'],.cell[data-value='512'],.cell[data-value='1024']{background:gold;color:#fff} .cell[data-value='2048']{background:#edc22e;color:#fff} .cell[data-value='4096']{background:paleturquoise} .cell[data-value='8192']{background:greenyellow} .cell[data-value='16384']{background:firebrick;color:#fff} .cell[data-value='32768']{background:red;color:#fff} .cell[data-value='65536']{background:yellowgreen} .cell[data-value='131072']{background:linear-gradient(45deg,red,orange,yellow,greenyellow,cyan,purple);color:#fff} .cell[data-value='262144']{background:url('png1.png');background-size:cover;color:#fff}

#rankingPage{display:none}

/* ゲームオーバーUI */ #gameOverScreen{ position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(238,228,218,0.85); display:none; align-items:center; justify-content:center; flex-direction:column; font-size:28px; } button{margin:5px;padding:8px 14px} </style>

</head>
<body>
<h1>2048 BigInt</h1>
<div id="gamePage">
<div id="score">Score: 0</div>
<div id="best">Best: 0</div>
<br>
<button id="newGame">New Game</button>
<button id="giveUp">ギブアップ</button>
<button onclick="showRanking()">ランキング</button>
<div id="grid"></div>
<div id="gameOverScreen">
<div id="finalScore"></div>
<button onclick="confirmSave()">スコア登録</button>
<button onclick="initGame()">もう一回</button>
</div>
</div><div id="rankingPage">
<h2>ランキング</h2>
<ol id="leaderList"></ol>
<button onclick="hideRanking()">戻る</button>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDexDTYhiorR_ccbBUUgYBgpMC_gwH8ja8",
  authDomain: "nyzhati.firebaseapp.com",
  projectId: "nyzhati",
  storageBucket: "nyzhati.firebasestorage.app",
  messagingSenderId: "76057333441",
  appId: "1:76057333441:web:797d05036f67bc22df0e40",
  measurementId: "G-ETHN43R9QF"
};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const grid=document.getElementById("grid");
const size=8;
let cells=[],values=[],score=0n;
let saved=false;

const suffixes=["","k","m","b","t","q","Q","s","S","O","N"];
function formatBigInt(v){if(v<1000n)return v.toString();let i=0;while(v>=1000n){v/=1000n;i++;}return v+suffixes[i];}

function updateCellDisplay(c,v){
c.innerText=v>0n?formatBigInt(v):"";
c.dataset.value=v.toString();
}

function updateScore(){
document.getElementById("score").innerText="Score: "+formatBigInt(score);
let best=BigInt(localStorage.getItem("best")||"0");
if(score>best){best=score;localStorage.setItem("best",best.toString());}
document.getElementById("best").innerText="Best: "+formatBigInt(best);
}

function createBoard(){
grid.style.gridTemplateColumns=`repeat(${size},70px)`;
grid.innerHTML="";cells=[];values=[];saved=false;
for(let i=0;i<size*size;i++){
 let c=document.createElement("div");
 c.className="cell";
 grid.appendChild(c);
 cells.push(c);
 values.push(0n);
}
addTile();addTile();update();
}

function addTile(){
let empty=values.map((v,i)=>v===0n?i:null).filter(v=>v!==null);
if(!empty.length)return;
let i=empty[Math.floor(Math.random()*empty.length)];
values[i]=Math.random()<0.9?2n:4n;
}

function update(){
for(let i=0;i<values.length;i++)updateCellDisplay(cells[i],values[i]);
updateScore();
}

function move(dir){
let moved=false;
function get(r,c){return values[r*size+c]}
function set(r,c,v){values[r*size+c]=v}
for(let i=0;i<size;i++){
 let arr=[];let idxs=[];
 for(let j=0;j<size;j++){
  let r=dir=="up"||dir=="down"?j:i;
  let c=dir=="left"||dir=="right"?j:i;
  if(dir=="right")c=size-1-j;
  if(dir=="down")r=size-1-j;
  arr.push(get(r,c));idxs.push([r,c]);
 }
 arr=arr.filter(v=>v>0n);
 for(let k=0;k<arr.length-1;k++){
  if(arr[k]==arr[k+1]){
   arr[k]*=2n;
   score+=arr[k];
   arr[k+1]=0n;
   moved=true;
  }
 }
 arr=arr.filter(v=>v>0n);
 while(arr.length<size)arr.push(0n);
 for(let k=0;k<size;k++){
  let [r,c]=idxs[k];
  if(get(r,c)!=arr[k]){
   set(r,c,arr[k]);
   cells[r*size+c].classList.add("merge");
   setTimeout(()=>cells[r*size+c].classList.remove("merge"),120);
   moved=true;
  }
 }
}
if(moved){addTile();update();checkGameOver();}
}

function checkGameOver(){
if(values.includes(0n)) return;
for(let r=0;r<size;r++){
 for(let c=0;c<size;c++){
  let v=values[r*size+c];
  if(c<size-1 && values[r*size+c+1]===v) return;
  if(r<size-1 && values[(r+1)*size+c]===v) return;
 }
}
endGame();
}

function endGame(){
if(saved)return;
saved=true;
document.getElementById("gameOverScreen").style.display="flex";
document.getElementById("finalScore").innerText="スコア: "+formatBigInt(score);
}

window.confirmSave=async()=>{
let name=prompt("名前");
if(!name)name="匿名";
await addDoc(collection(db,"scores"),{name,score:score.toString(),scoreNum:Number(score)});
};

window.initGame = function(){
    document.getElementById("gameOverScreen").style.display = "none";
    score = 0n;
    createBoard();
}

// 操作
document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft")move('left');
if(e.key=="ArrowRight")move('right');
if(e.key=="ArrowUp")move('up');
if(e.key=="ArrowDown")move('down');
});

// スワイプ
let startX=0,startY=0,isDown=false;

grid.addEventListener("mousedown",e=>{isDown=true;startX=e.clientX;startY=e.clientY;});
document.addEventListener("mouseup",e=>{if(!isDown)return;isDown=false;handleSwipe(e.clientX,e.clientY);});

grid.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;});
grid.addEventListener("touchend",e=>{handleSwipe(e.changedTouches[0].clientX,e.changedTouches[0].clientY);});

function handleSwipe(endX,endY){
let dx=endX-startX;
let dy=endY-startY;
if(Math.abs(dx)>Math.abs(dy)){
 if(dx>20)move('right');
 if(dx<-20)move('left');
}else{
 if(dy>20)move('down');
 if(dy<-20)move('up');
}
}

// ランキング
window.showRanking=async()=>{
document.getElementById("gamePage").style.display="none";
document.getElementById("rankingPage").style.display="block";
const q=query(collection(db,"scores"),orderBy("scoreNum","desc"),limit(20));
const snap=await getDocs(q);
let html="";let i=1;
snap.forEach(doc=>{let d=doc.data();html+=`<li>#${i++} ${d.name}: ${formatBigInt(BigInt(d.score))}</li>`});
document.getElementById("leaderList").innerHTML=html;
}
window.hideRanking=()=>{
document.getElementById("rankingPage").style.display="none";
document.getElementById("gamePage").style.display="block";
}

// ギブアップ
document.getElementById("giveUp").onclick=endGame;

document.getElementById("newGame").onclick=initGame;

createBoard();
</script>

<h3>この2048ゲームは、BigIntで表されています。バグなどにつきましては、このFirebase Chatなどで報告をお願いします。</h3>

</body>
</html>
