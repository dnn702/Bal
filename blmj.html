<style>
* {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

button,
.item,
.tabButton {
  user-select: none;
  -webkit-user-select: none;
}
body{
  font-family:sans-serif;
  background:#f3f3f3;
  margin:20px;
}

.category{
  border-radius:15px;
  padding:15px;
  margin-bottom:20px;
  color:white;
}

.category h2{
  margin-top:0;
}

.item{
  background:rgba(255,255,255,0.85);
  color:black;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  cursor:pointer;
  white-space:pre-wrap;
}

.item:hover{
  background:white;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px 20px;
  border-radius:10px;
  display:none;
  z-index:9999;
}

#mainLayout {
  display: flex;
  gap: 15px;
  height: 80vh;
}

/* 左のジャンル欄 */
#categoryTabs {
  width: 130px;
  min-width: 130px;
  max-height: 100%;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-right: 5px;
}

/* スクロールバー */
#categoryTabs::-webkit-scrollbar {
  width: 8px;
}

#categoryTabs::-webkit-scrollbar-thumb {
  background: #bbb;
  border-radius: 10px;
}

/* ジャンルボタン */
.tabButton {
  min-height: 70px;
  padding: 8px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  text-align: center;
  
  display: flex;
  justify-content: center;
  align-items: center;
  
  word-break: break-word;
  overflow-wrap: anywhere;
  line-height: 1.2;
  
  transition: 0.2s;
}

/* 選択中だけ黒枠 */
.tabButton.active {
  outline: 4px solid black;
}
.category,
.tabButton {
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* 右の内容欄 */
#contentArea {
  flex: 1;
  min-width: 0;
  overflow: auto;
}

button{
  padding:10px 15px;
  margin-right:8px;
  margin-bottom:15px;
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9998;
}

.hidden{
  display:none;
}

.modalBox{
  background:white;
  padding:20px;
  border-radius:15px;
  width:min(400px,90%);
  color:black;
  position:relative;
}

.modalBox input{
  width:100%;
  margin:8px 0 15px;
  padding:8px;
  box-sizing:border-box;
}

.closeBtn{
  position:absolute;
  top:10px;
  right:10px;
  border:none;
  background:none;
  font-size:24px;
  cursor:pointer;
}
.firebase-post {
  pointer-events: auto !important;
}

.firebase-post button {
  pointer-events: auto !important;
  position: relative;
  z-index: 999999 !important;
  touch-action: auto !important;
}
</style>
</head>

 if (type === "image") {

      imageBase64,
      likes: 0,

      createdAt: Date.now()
    }
  );
}
  
  showToast("投稿しました");
};

function loadFirebasePosts(category){

  if (unsubscribePosts) {
    unsubscribePosts();
  }

  unsubscribePosts = onSnapshot(
    collection(db,"posts"),
    snap=>{

      content
        .querySelectorAll(
          ".firebase-post"
        )
        .forEach(el=>el.remove());

      snap.forEach(docSnap=>{

        const post =
          docSnap.data();

        const postCategory =
  (post.category || "")
  .replace(/<[^>]+>/g, "")
  .trim();

const currentCategory =
  (category || "")
  .replace(/<[^>]+>/g, "")
  .trim();

if (
  postCategory !==
  currentCategory
) return;

        // 全体
        const item =
          document.createElement(
            "div"
          );

        item.className =
          "item firebase-post";

        // ===== 本文表示だけ =====
        const body =
          document.createElement(
            "div"
          );

        if(
          post.type === "text"
        ){
          body.innerHTML =
            post.text;
        }

        if(
          post.type === "image"
        ){
          body.innerHTML =
            `<img src="${post.imageBase64}" style="max-width:150px">`;
        }

        item.appendChild(body);

        // ===== ボタン欄 =====
        const buttonRow =
          document.createElement(
            "div"
          );

        buttonRow.style.marginTop =
          "8px";

        // ------------------
        // コピー
        // ------------------
        const copyBtn =
          document.createElement(
            "button"
          );

        copyBtn.textContent =
          "📋コピー";

        copyBtn.onclick =
        async()=>{

          if(
            post.type === "text"
          ){
            await navigator
              .clipboard
              .writeText(
                post.text
              );

            showToast(
              "文字をコピー"
            );
          }

          if (post.type === "image") {
  
  try {
    
    const img = new Image();
    img.src = post.imageBase64;
    await img.decode();
    
    const canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;
    
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);
    
    const blob = await new Promise(resolve => {
      canvas.toBlob(resolve, "image/png");
    });
    
    if (!blob) {
      throw new Error("blob生成失敗");
    }
    
    await navigator.clipboard.write([
      new ClipboardItem({
        "image/png": blob
      })
    ]);
    
    showToast("画像コピー成功");
    
  } catch (err) {
    
    console.error("コピーエラー:", err);
    showToast("コピーできず...");
    
  }
}
        };

        buttonRow.appendChild(
          copyBtn
        );

        // ------------------
        // いいね
        // ------------------
        const likeBtn =
          document.createElement(
            "button"
          );

        const likeKey =
          "liked_" +
          docSnap.id;

        const alreadyLiked =
          localStorage.getItem(
            likeKey
          );

        likeBtn.textContent =
          `❤️ ${post.likes}`;

        if(alreadyLiked){
          likeBtn.disabled =
            true;

          likeBtn.textContent =
            `❤️ ${post.likes} 済`;
        }

        likeBtn.onclick =
        async()=>{

          if(
            localStorage.getItem(
              likeKey
            )
          ) return;

          await updateDoc(
            doc(
              db,
              "posts",
              docSnap.id
            ),
            {
              likes:
              increment(1)
            }
          );

          localStorage.setItem(
            likeKey,
            "1"
          );

          showToast(
            "いいねしました"
          );
        };

        buttonRow.appendChild(
          likeBtn
        );

        // ------------------
        // 削除
        // ------------------
        if(
          post.uid ===
          auth.currentUser.uid
        ){

          const deleteBtn =
            document
            .createElement(
              "button"
            );

          deleteBtn.textContent =
            "🗑削除";

          deleteBtn.onclick =
          async()=>{

            const ok =
              confirm(
                "削除しますか？"
              );

            if(!ok) return;

            await deleteDoc(
              doc(
                db,
                "posts",
                docSnap.id
              )
            );

            showToast(
              "削除しました"
            );
          };

          buttonRow.appendChild(
            deleteBtn
          );
        }

        item.appendChild(
          buttonRow
        );

        content.appendChild(
          item
        );

      });

    }
  );
}

function resizeAndEncode(file) {
  
  return new Promise(
    (resolve) => {
      
      const reader =
        new FileReader();
      
      reader.onload = e => {
        
        const img =
          new Image();
        
        img.onload = () => {
          
          let width =
            img.width;
          
          let height =
            img.height;
          
          const maxSize = 500;
          
          if (
            width > maxSize ||
            height > maxSize
          ) {
            
            if (width > height) {
              height =
                height *
                (maxSize / width);
              
              width =
                maxSize;
            } else {
              width =
                width *
                (maxSize / height);
              
              height =
                maxSize;
            }
          }
          
          const canvas =
            document
            .createElement(
              "canvas"
            );
          
          canvas.width =
            width;
          
          canvas.height =
            height;
          
          const ctx =
            canvas
            .getContext("2d");
          
          ctx.drawImage(
            img,
            0,
            0,
            width,
            height
          );
          
          const base64 =
            canvas
            .toDataURL(
              "image/png",
              0.8
            );
          
          resolve(base64);
        };
        
        img.src =
          e.target.result;
      };
      
      reader.readAsDataURL(
        file
      );
    }
  );
}

      "このジャンルを削除しますか？"
    );
    
    if (!ok) return;
    
    DATA.splice(
      currentIndex,
      1
    );
    
    currentIndex = 0;
    
    saveData();
    
    renderTabs();
    
    renderContent();
    
    showToast(
      "ジャンルを削除しました"
    );
  };
  
  div.appendChild(
    deleteBtn
  );
}

function updatePostCategory() {
  
  const select =
    document.getElementById(
      "postCategory"
    );
  
  select.innerHTML = "";
  
  DATA.forEach(cat => {
    
    const option =
      document.createElement(
        "option"
      );
    
    // HTMLタグを除いた文字だけ
    option.textContent =
      cat.title.replace(
        /<[^>]+>/g,
        ""
      );
    
    option.value =
      option.textContent;
    
    select.appendChild(
      option
    );
    
  });
}

function renderTabs() {
  
  tabs.innerHTML = "";
  
  DATA.forEach((cat, index) => {
    
    const btn =
      document.createElement("button");
    
    btn.className = "tabButton";
    
    // HTML反映
    btn.innerHTML = cat.title;
    
    // 背景色・模様
   btn.style.background =
  cat.boxStyle;

btn.style.backgroundSize =
  "cover";

btn.style.backgroundPosition =
  "center";

btn.style.backgroundRepeat =
  "no-repeat";
    // 文字数でフォント縮小
    const plainText =
      btn.textContent || "";
    
    const len =
      plainText.length;
    
    let size = 20;
    
    if (len > 6) size = 18;
    if (len > 10) size = 16;
    if (len > 16) size = 14;
    if (len > 22) size = 12;
    
    btn.style.fontSize =
      size + "px";
    
    // 選択中
    if (index === currentIndex) {
      btn.classList.add(
        "active"
      );
    }
    
    btn.onclick = () => {
      currentIndex = index;
      renderTabs();
      renderContent();
    };
    
    tabs.appendChild(btn);
    
  });
  
  updatePostCategory();
  
}

function showToast(
  text="コピーしました"
){
  const toast=
  document.getElementById(
    "toast"
  );

  toast.textContent=text;
  toast.style.display=
    "block";

  setTimeout(()=>{
    toast.style.display=
      "none";
  },1000);
}

  document

}

window.closeCategoryModal = function(){
  document

  )
  .classList

}

window.submitCategory = function(){

  const title=
  document
  .getElementById(
    "categoryNameInput"
  )
  .value
  .trim();

  const style=
  document
  .getElementById(
    "categoryStyleInput"
  )
  .value
  .trim();

  if(!title) return;

  DATA.push({
    title:title,
    boxStyle:
      style || "#999",
      custom: true,
    items:[]
  });

  saveData();

  renderTabs();

  document
  .getElementById(
    "categoryNameInput"
  ).value="";

  document
  .getElementById(
    "categoryStyleInput"
  ).value="";

  closeCategoryModal();
}
