<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Video BPM Tool</title>
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  padding:20px;
  background:#f5f5f5;
}
h1{
  font-size:22px;
}
video{
  width:100%;
  max-width:800px;
  background:black;
  border-radius:12px;
  display:block;
  margin-top:16px;
}
.controls{
  margin-top:16px;
}
input,button{
  font-size:16px;
  padding:8px 12px;
  margin:4px 0;
}
#status{
  margin-top:10px;
  color:#444;
}
</style>
</head>
<body>

<h1>動画倍速ツール</h1>

<input id="fileInput" type="file" accept="video/*">

<video
  id="video"
  controls
  playsinline
  preload="metadata"
></video>

<div class="controls">
  <label>倍率：</label>
  <input id="rateInput" value="185/60">
  <button id="applyBtn">適用</button>
</div>
  <script src="https://cdn.jsdelivr.net/npm/soundtouchjs@0.1.30/dist/soundtouch.min.js"></script>

<br>
<label>ピッチ:</label>
<input id="pitchInput" value="1">
<button id="applyPitch">ピッチ適用</button>

<div id="status">動画を選択してください</div>

<script>
const fileInput = document.getElementById("fileInput");
const video = document.getElementById("video");
const rateInput = document.getElementById("rateInput");
const applyBtn = document.getElementById("applyBtn");
const status = document.getElementById("status");

let currentObjectURL = null;

function parseRate(text){
  text = text.trim();

  if(text.includes("/")){
    const parts = text.split("/");
    if(parts.length !== 2){
      throw new Error("bad fraction");
    }

    const a = Number(parts[0]);
    const b = Number(parts[1]);

    if(!isFinite(a) || !isFinite(b) || b === 0){
      throw new Error("bad number");
    }

    return a / b;
  }

  const n = Number(text);

  if(!isFinite(n)){
    throw new Error("bad number");
  }

  return n;
}

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  if(!file) return;

  status.textContent = "読み込み中...";

  if(currentObjectURL){
    URL.revokeObjectURL(currentObjectURL);
  }

  currentObjectURL = URL.createObjectURL(file);

  video.src = currentObjectURL;
  video.load();
});

video.addEventListener("loadedmetadata", () => {
  status.textContent =
    "読み込み成功: " +
    fileInput.files[0].name;
});

video.addEventListener("error", () => {
  status.textContent =
    "再生失敗。この動画形式はブラウザ非対応かも";
});

applyBtn.addEventListener("click", async () => {
  try{
    const rate = parseRate(rateInput.value);

    video.playbackRate = rate;

    await video.play();

    status.textContent =
      "倍率適用: " +
      rateInput.value +
      " = " +
      rate;
  }catch(err){
    status.textContent =
      "倍率エラー or 再生失敗";
    console.error(err);
  }
});
  let audioCtx;
let sourceNode;
let soundTouch;
let filter;

async function setupPitch(file){
  const arrayBuffer = await file.arrayBuffer();

  audioCtx = new AudioContext();

  const audioBuffer =
    await audioCtx.decodeAudioData(arrayBuffer);

  const source =
    {
      extract: function(target, numFrames, pos){
        const l =
          audioBuffer.getChannelData(0);
        const r =
          audioBuffer.numberOfChannels > 1
          ? audioBuffer.getChannelData(1)
          : l;

        for(let i=0;i<numFrames;i++){
          target[i*2] = l[pos+i] || 0;
          target[i*2+1] = r[pos+i] || 0;
        }

        return Math.min(
          numFrames,
          l.length-pos
        );
      }
    };

  soundTouch =
    new soundtouch.SoundTouch(
      audioBuffer.sampleRate
    );

  const pitch =
    Number(
      document.getElementById(
        "pitchInput"
      ).value
    );

  soundTouch.pitch = pitch;

  const stSource =
    new soundtouch.SimpleFilter(
      source,
      soundTouch
    );

  filter =
    new soundtouch.getWebAudioNode(
      audioCtx,
      stSource
    );

  filter.connect(
    audioCtx.destination
  );
}

document
.getElementById("applyPitch")
.addEventListener(
"click",
()=>{
  if(soundTouch){
    soundTouch.pitch =
      Number(
        document
        .getElementById(
          "pitchInput"
        ).value
      );
  }
});
</script>

</body>
</html>
