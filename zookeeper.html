<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Zookeeper Avatar Collection</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

</head>

<body>

<h1>Zookeeper Avatar Collection</h1>

<div class="topBar">

<button id="uploadOpen">＋投稿</button>

<select id="sort">
<option value="rare">レア度</option>
<option value="cute">かわいさ</option>
<option value="cool">かっこよさ</option>
<option value="likes">人気</option>
</select>

<input id="search" placeholder="アバター検索">

</div>




<div id="avatarGrid"></div>

<div id="uploadModal" class="modal">
<div class="modalBox">

<h2>アバター投稿</h2>

<input id="name" placeholder="名前">

<label>かっこよさ</label>
<input type="number" id="cool">

<label>かわいさ</label>
<input type="number" id="cute">

<label>レア度</label>
<input type="number" id="rare">

<input type="file" id="image">

<button id="uploadBtn">投稿</button>

<button onclick="closeUpload()">閉じる</button>

</div>
</div>

<div id="detailModal" class="detailModal">

<div class="detailUI">
<p id="detailName"></p>
<button class="dlt" onclick="deleteAvatar()">削除</button>
<button id="backBtn">戻る</button>

<div class="avatarImage">
<img id="detailAvatar">

</div>

<div class="stats">

<div class="statRow">
<img src="assets/star.png" class="icon">
<span id="coolValue" class="gameFont"></span>
</div>

<div class="statRow">
<img src="assets/heart.png" class="icon">
<span id="cuteValue" class="gameFont"></span>
</div>

<button onclick="likeAvatar()">👍 いいね</button>
<button onclick="badAvatar()">👎 バッド</button>

</div>

</div>

</div>



<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="upload.js"></script>
<script src="avatars.js"></script>
<script src="font.js"></script>
<script src="detail.js"></script>
<script src="like.js"></script>
<script src="report.js"></script>



</body>
</html>
