<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>

<body>
  
  <input type="file" id="fileInput">
<img id="view" width="300">


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwfB5Ae0ilP9oruaz3W7Tm66u-RyR0VeI",
  authDomain: "gzgzgzgz-12b78.firebaseapp.com",
  projectId: "gzgzgzgz-12b78",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Base64変換
function toBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

// アップロード
document.getElementById("fileInput").addEventListener("change", async (e) => {
  alert("選択された"); // ←これで確認できる

  const file = e.target.files[0];
  const base64 = await toBase64(file);

  try {
    await setDoc(doc(db, "shared", "image"), {
      data: base64,
      time: Date.now()
    });
    alert("アップ成功");
  } catch (err) {
    alert("エラー: " + err);
  }
});

// リアルタイム表示
onSnapshot(doc(db, "shared", "image"), (docSnap) => {
  if (docSnap.exists()) {
    document.getElementById("view").src = docSnap.data().data;
  }
});
</script>
  
</body>

</html>
